apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    project: roboshop
    environment: dev
  annotations:
    kubernetes.io/change-cause: "moving to 1.25 version"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      project: roboshop
      environment: dev
  template:
    metadata:
      labels:
        app: nginx
        project: roboshop
        environment: dev
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
