apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamic-efs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: roboshop-efs
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: dynamic-efs
spec:
  containers:
    - name: app
      image: nginx
      volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
  volumes:
    - name: html
      persistentVolumeClaim:
        claimName: dynamic-efs
