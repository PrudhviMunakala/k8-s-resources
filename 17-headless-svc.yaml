apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset
  labels:
    project: roboshop
    environment: dev
spec:
  replicas: 3 # maintains 3 pods at all times
  selector:
    matchLabels:
      app: nginx # must match template labels below
      project: roboshop
      environment: dev
  # Pod Definition
  template:
    metadata:
      labels:
        app: nginx # must match selector above
        project: roboshop
        environment: dev
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    project: roboshop
    environment: dev
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
